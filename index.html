<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Celine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fff0f3;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Keeps everything inside the frame */
            position: fixed; /* Prevents "pull-to-refresh" on mobile */
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 40px;
            pointer-events: none;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            touch-action: none; /* Disables default phone gestures */
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
            z-index: 10;
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute; /* Allows it to move anywhere in the frame */
            transition: all 0.1s ease;
            z-index: 5;
        }

        #message {
            display: none;
            color: #c9184a;
            font-size: 2rem;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="quiz">
        <h1>Celine, do you love me?</h1>
        <div class="container">
            <button id="yesBtn" onclick="celebrate()">Yes</button>
            <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">No</button>
        </div>
    </div>

    <div id="message">
        Burne tizkk anaaa ❤️
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noBtn');
            
            // padding ensures it doesn't touch the very edge of the screen
            const padding = 20; 
            
            // Get the width and height of the visible "frame"
            const maxWidth = window.innerWidth - btn.offsetWidth - padding;
            const maxHeight = window.innerHeight - btn.offsetHeight - padding;

            // Generate random coordinates within those bounds
            const randomX = Math.max(padding, Math.floor(Math.random() * maxWidth));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxHeight));

            // Apply the new position
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function celebrate() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('message').style.display = 'block';
        }

        // Initialize No button position near the Yes button
        window.onload = () => {
            const noBtn = document.getElementById('noBtn');
            noBtn.style.top = (window.innerHeight / 2 + 60) + "px";
            noBtn.style.left = (window.innerWidth / 2 - noBtn.offsetWidth / 2) + "px";
        };
    </script>
</body>
</html>
