<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Celine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fff0f3;
            font-family: sans-serif;
            overflow: hidden;
            position: fixed;
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 50px;
            text-align: center;
            padding: 0 20px;
        }

        /* This keeps the buttons together at the start */
        .button-wrapper {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 50px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            touch-action: none; /* Prevents zooming/scrolling on touch */
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            z-index: 100;
        }

        #noBtn {
            background-color: #888;
            color: white;
            position: static; /* Starts inline, then turns absolute */
            transition: 0.1s ease;
            z-index: 99;
        }

        #message {
            display: none;
            font-size: 2.2rem;
            color: #c9184a;
            font-weight: bold;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="quiz">
        <h1>Babe, can we fuck , suck ?</h1>
        <div class="button-wrapper">
            <button id="yesBtn" onclick="celebrate()">Yes</button>
            <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton(event)">No</button>
        </div>
    </div>

    <div id="message">
        Burne tizkk anaaa ❤️
    </div>

    <script>
        function moveButton(event) {
            // Stop the phone from trying to click the button
            if(event) event.preventDefault();

            const btn = document.getElementById('noBtn');
            
            // On first touch, change it to absolute so it can fly anywhere
            btn.style.position = 'absolute';

            // Define the "Frame" (padding of 30px so it stays away from edges)
            const padding = 40;
            const maxWidth = window.innerWidth - btn.offsetWidth - padding;
            const maxHeight = window.innerHeight - btn.offsetHeight - padding;

            // Pick a random spot inside the frame
            const randomX = Math.max(padding, Math.floor(Math.random() * maxWidth));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxHeight));

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function celebrate() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('message').style.display = 'block';
        }
    </script>
</body>
</html>
